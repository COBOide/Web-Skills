<!DOCTYPE html>
  <head>
    <title>Fine Tuning Your Text</title>
  </head>
  <body>
    <!-- these are samples of what text will look like when certain attributes and elements are used -->
    <h1>
      Fine Tuning Your Text
    </h1>
    <h5>	
      p. 29-37
    </h5>
    <p>This text is normal</p>
    <p><b>This text is bold</b></p>
    <p><i>This text is italic</i></p>
    <p>This is<sub> subscript</sub> and <sup>superscript</sup></p>
    <p><strong>This text is important!</strong></p>
    <!-- using the strong tag will make the text appear Bold, the difference is
that with a screen reader emphasis would be placed on the phrase-->
  </body>
</html>
